<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Record Not Found | Solomon Kin Records</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-gold: #fbbf24;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error-red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at center, #1e293b, #0f172a);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .error-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            padding: 60px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 600px;
        }

        .icon {
            font-size: 80px;
            color: var(--error-red);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-code {
            color: var(--accent-gold);
            font-weight: 800;
            font-size: 1.2rem;
            display: block;
            margin-bottom: 20px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .btn {
            display: inline-block;
            background: var(--accent-gold);
            color: #000;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 8px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
        }

        .footer-logo {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="icon">⚠️</div>
    <span class="status-code">ERROR CODE: 404</span>
    <h1>Administrative Access Error</h1>
    <p>The record, affiliation, or document you are searching for is currently unlisted or has been moved within the Solomon Kin Records ledger.</p>
    
    <a href="index.html" class="btn">Return to Central Registry</a>

    <div class="footer-logo">
        SOLOMON KIN RECORDS | CORPORATE MANAGEMENT DIV.
    </div>
</div>

</body>
</html>
